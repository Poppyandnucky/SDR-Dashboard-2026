services:
  sdr-api:
    build:
      context: .
      dockerfile: sdr-api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      RUN_CACHE_TTL_SECONDS: "900"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  sdr-web:
    build:
      context: ./sdr-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - sdr-api
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
